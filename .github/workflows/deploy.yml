name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch.
  push:
    branches: [master]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the token the permissions needed to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one so a
# running publish always finishes cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Detects pnpm from the lockfile / packageManager field, installs deps,
      # runs `astro build`, and uploads dist/ as the Pages artifact.
      - name: Build with Astro
        uses: withastro/action@v4
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
